! Cisco IOS-XR equivalent — Aurora Sydney PE
!
hostname sydney
!
interface Loopback0
 description router-id
 ipv4 address 10.0.0.2 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 description to-melbourne
 ipv4 address 10.1.12.1/31
!
interface GigabitEthernet0/0/0/1
 description to-brisbane
 ipv4 address 10.1.23.0/31
!
interface GigabitEthernet0/0/0/2
 description to-geelong
 ipv4 address 10.1.24.0/31
!
router isis CORE
 net 49.0001.0010.0000.0002.00
 is-type level-2-only
 address-family ipv4 unicast
  metric-style wide
 !
 interface Loopback0
  passive
  address-family ipv4 unicast
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv4 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv4 unicast
  !
 !
 interface GigabitEthernet0/0/0/2
  point-to-point
  address-family ipv4 unicast
  !
 !
!
mpls ldp
 router-id 10.0.0.2
 address-family ipv4
 !
 interface GigabitEthernet0/0/0/0
 !
 interface GigabitEthernet0/0/0/1
 !
 interface GigabitEthernet0/0/0/2
 !
!
router bgp 65100
 bgp router-id 10.0.0.2
 address-family ipv4 unicast
 !
 neighbor-group IBGP_PE
  remote-as 65100
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
  !
 !
 neighbor 10.0.0.1
  use neighbor-group IBGP_PE
 !
 neighbor 10.0.0.3
  use neighbor-group IBGP_PE
 !
 neighbor 10.0.0.4
  use neighbor-group IBGP_PE
 !
!
end
