frr defaults traditional
hostname melbourne
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.1/32
 ip router isis CORE
 isis circuit-type level-2-only
!
interface eth1
 ip address 10.1.12.1/30
 ip router isis CORE
 isis network point-to-point
 isis circuit-type level-2-only
 mpls ldp
!
interface eth2
 ip address 10.1.41.2/30
 ip router isis CORE
 isis network point-to-point
 isis circuit-type level-2-only
 mpls ldp
!
interface eth3
 ip address 10.1.13.1/30
 ip router isis CORE
 isis network point-to-point
 isis circuit-type level-2-only
 mpls ldp
!
router isis CORE
 net 49.0001.0010.0000.0001.00
 is-type level-2-only
 metric-style wide
 lsp-gen-interval 5
!
mpls ldp
 router-id 10.0.0.1
 !
 address-family ipv4
  discovery transport-address 10.0.0.1
  interface eth1
  interface eth2
  interface eth3
 exit-address-family
 !
!
router bgp 65100
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as 65100
 neighbor 10.0.0.2 update-source lo
 neighbor 10.0.0.3 remote-as 65100
 neighbor 10.0.0.3 update-source lo
 neighbor 10.0.0.4 remote-as 65100
 neighbor 10.0.0.4 update-source lo
 !
 address-family ipv4 unicast
  network 10.0.0.1/32
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 next-hop-self
  neighbor 10.0.0.3 activate
  neighbor 10.0.0.3 next-hop-self
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 next-hop-self
 exit-address-family
!
end
