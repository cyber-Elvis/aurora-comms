frr defaults traditional
hostname sydney
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.2/32
 ip router isis CORE
 isis circuit-type level-2-only
!
interface eth1
 description to-melbourne
 ip address 10.1.12.1/31
 ip router isis CORE
 isis network point-to-point
 isis circuit-type level-2-only
 mpls ldp
!
interface eth2
 description to-brisbane
 ip address 10.1.23.0/31
 ip router isis CORE
 isis network point-to-point
 isis circuit-type level-2-only
 mpls ldp
!
interface eth3
 description to-geelong
 ip address 10.1.24.0/31
 ip router isis CORE
 isis network point-to-point
 isis circuit-type level-2-only
 mpls ldp
!
router isis CORE
 net 49.0001.0010.0000.0002.00
 is-type level-2-only
 metric-style wide
 lsp-gen-interval 5
!
mpls ldp
 router-id 10.0.0.2
 !
 address-family ipv4
  discovery transport-address 10.0.0.2
  interface eth1
  interface eth2
  interface eth3
 exit-address-family
 !
!
router bgp 65100
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor IBGP_PE peer-group
 neighbor IBGP_PE remote-as 65100
 neighbor IBGP_PE update-source lo
 neighbor 10.0.0.1 peer-group IBGP_PE
 neighbor 10.0.0.3 peer-group IBGP_PE
 neighbor 10.0.0.4 peer-group IBGP_PE
 !
 address-family ipv4 unicast
  network 10.0.0.2/32
  neighbor IBGP_PE activate
  neighbor IBGP_PE next-hop-self
 exit-address-family
!
end
