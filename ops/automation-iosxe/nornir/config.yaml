---
# Nornir config for the Region A IOS-XE transit nodes. Run from this directory via nr.sh.
inventory:
  plugin: SimpleInventory
  options:
    host_file: "inventory/hosts.yaml"
    group_file: "inventory/groups.yaml"
    defaults_file: "inventory/defaults.yaml"
runner:
  plugin: threaded
  options:
    num_workers: 4          # both transit nodes concurrently (mirrors Ansible forks)
