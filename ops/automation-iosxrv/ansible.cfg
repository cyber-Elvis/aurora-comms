[defaults]
inventory = ./inventory.yml
host_key_checking = True
vault_password_file = ~/.aurora-vault-pass
gathering = explicit
# Built-in default callback with YAML-formatted results (no community.general needed).
stdout_callback = default
result_format = yaml
retry_files_enabled = False
interpreter_python = auto_silent
# Run hosts concurrently — all Region A nodes get the change at once (>= node count).
forks = 8

[persistent_connection]
command_timeout = 90
connect_timeout = 60
