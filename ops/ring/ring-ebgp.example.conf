# Aurora ADR-004 lab data-plane ring policy sketch.
# This is intentionally vendor-neutral. Do not paste directly into a device.

EDGE_ASNS:
  pc1-edge: 64503
  pc2-edge: 64504
  do-edge: 64505
  oci-edge: 64506

EDGE_LOOPBACKS:
  pc1-edge: 10.0.2.1/32
  pc2-edge: 10.0.2.2/32
  do-edge: 10.0.2.3/32
  oci-edge: 10.0.2.4/32

RING_LINKS:
  pc1-edge_to_pc2-edge: local ethernet / existing PC1-PC2 path
  pc2-edge_to_do-edge: 10.255.255.0/31 over WireGuard
  oci-edge_to_pc1-edge: 10.255.255.2/31 over WireGuard
  do-edge_to_oci-edge: 10.255.255.4/31 over WireGuard

POLICY:
  import:
    - accept edge loopbacks
    - accept explicitly documented lab prefixes
    - reject host management subnets
  export:
    - advertise edge loopback
    - advertise explicitly documented lab prefixes
    - reject PC1, PC2, DigitalOcean-host, and Oracle-host management subnets

NO-HOST-SUBNETS:
  - 192.168.200.0/24 except explicitly documented service exceptions
  - Tailscale 100.64.0.0/10 host addresses
  - cloud host private subnets
  - any personal/home LAN subnets not explicitly modelled as lab transport
