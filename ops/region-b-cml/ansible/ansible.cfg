[defaults]
inventory = inventory/devnet-current.yml
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
# Break-glass / automation secrets live in Ansible Vault; pass file is created out-of-band.
vault_password_file = ~/.aurora-vault-pass
stdout_callback = yaml

[persistent_connection]
# CML over the openconnect bridge from Australia is ~150-250ms RTT — be generous.
connect_timeout = 60
command_timeout = 120
