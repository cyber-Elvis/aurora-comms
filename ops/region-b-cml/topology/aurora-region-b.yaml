# =============================================================================
# Aurora Region B — CML topology (design intent + first-import candidate)
# =============================================================================
# Canonical decision: docs/adr-002-two-region.md §3.2 ; addressing: ../addressing.md
#
# WHAT IS IN CML vs WHAT IS BRIDGED IN (see addressing.md §0):
#   In CML (native Cisco):  DC-P-R1/R2, MR-PE-R1, MR-PE-R2, HH-PE-R1/R2, MR-CE
#   In CML (BYOI, the ONE): JNX-P  (vJunos-router — can't run on the nested Dell)
#   NOT in CML — local + bridged via openconnect+MASQUERADE on PC1:
#       HH-CE  = PA-VM 9.0.4 on PC1 vrnetlab   (PE-CE eBGP to HH-PE pair over the bridge)
#       JNX-FW = vSRX on Dell standalone        (optional security CE to HH-PE-R2)
#       helix-lan-sw = Aruba CX, local L2 behind HH-CE
#   These local CEs attach through the EXT-HELIX-BR unmanaged switch -> EXT-CONN
#   external connector, which egresses to the bridge (set the connector's bridge
#   per reservation in CML).
#
# BEFORE IMPORT — verify against the LIVE controller (varies by CML release):
#   1. Schema version:   export any existing lab, check `lab.version`; match it below.
#   2. node_definition slugs: GET /api/v0/node_definitions
#        Cisco IOS XR 7.x -> usually `iosxrv9000`   (Region A's 6.1.3 = `iosxrv`)
#        Cat8000v IOS XE  -> usually `cat8000v`
#        vJunos-router    -> BYOI, e.g. `vjunos-router` (create the node def first)
#        external_connector / unmanaged_switch are CML built-ins.
#   3. Interface slot/label per node def can differ — fix to match the live def.
#
# If the controller rejects this schema: build from this file as the spec in the UI,
# then EXPORT the controller's YAML back over this file and commit it as the new canonical.
#
# SECRETS: day-0 references __LABADMIN_SECRET__ — substitute from Vault into a working
# copy before import (gitignored); never commit it. SSH host keys are generated post-boot.
# =============================================================================
lab:
  title: Aurora Region B
  description: Cisco-dominant (+ vJunos BYOI) ephemeral region — ADR-002 §3.2; non-Cisco CEs bridged in
  notes: |
    Rebuilt from version control each DevNet CML reservation.
    Day-0 = mgmt + loopback + core IPs + IS-IS L2 + LDP. Service config via Ansible.
    PA-VM (PC1 vrnetlab 9.0.4), vSRX (Dell), Aruba CX (local) attach via the bridge.
  version: 0.1.0

nodes:
  # --- Aurora-DC P core (route-reflector cluster, IOS XR) ----------------------
  - id: n0
    label: DC-P-R1
    node_definition: iosxrv9000
    x: -400
    y: -200
    tags: [region-b, dc, p-core, rr, asbr]
    configuration: |-
      hostname DC-P-R1
      domain name aurora.lab
      username labadmin
       group root-lr
       group cisco-support
       secret 10 __LABADMIN_SECRET__
      !
      ssh server v2
      ssh server vrf default
      !
      interface Loopback0
       ipv4 address 10.0.20.1 255.255.255.255
      !
      interface MgmtEth0/0/CPU0/0
       ipv4 address dhcp
       no shutdown
      !
      interface GigabitEthernet0/0/0/0
       description CORE to DC-P-R2
       ipv4 address 10.255.20.0 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description CORE to MR-PE-R1
       ipv4 address 10.255.20.2 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description CORE to HH-PE-R1
       ipv4 address 10.255.20.6 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/3
       description CORE to JNX-P (multivendor)
       ipv4 address 10.255.20.14 255.255.255.254
       no shutdown
      !
      router isis 1
       is-type level-2-only
       net 49.0002.0000.0000.2001.00
       address-family ipv4 unicast
        metric-style wide
       !
       interface Loopback0
        passive
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/2
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/3
        point-to-point
        address-family ipv4 unicast
      !
      mpls ldp
       router-id 10.0.20.1
       interface GigabitEthernet0/0/0/0
       interface GigabitEthernet0/0/0/1
       interface GigabitEthernet0/0/0/2
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: MgmtEth0/0/CPU0/0, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet0/0/0/0, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet0/0/0/1, type: physical}
      - {id: i3, slot: 3, label: GigabitEthernet0/0/0/2, type: physical}
      - {id: i4, slot: 4, label: GigabitEthernet0/0/0/3, type: physical}
      - {id: i5, slot: 5, label: GigabitEthernet0/0/0/4, type: physical}

  - id: n1
    label: DC-P-R2
    node_definition: iosxrv9000
    x: -400
    y: 0
    tags: [region-b, dc, p-core, rr]
    configuration: |-
      hostname DC-P-R2
      domain name aurora.lab
      username labadmin
       group root-lr
       group cisco-support
       secret 10 __LABADMIN_SECRET__
      !
      ssh server v2
      ssh server vrf default
      !
      interface Loopback0
       ipv4 address 10.0.20.2 255.255.255.255
      !
      interface MgmtEth0/0/CPU0/0
       ipv4 address dhcp
       no shutdown
      !
      interface GigabitEthernet0/0/0/0
       description CORE to DC-P-R1
       ipv4 address 10.255.20.1 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description CORE to MR-PE-R2
       ipv4 address 10.255.20.4 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description CORE to HH-PE-R2
       ipv4 address 10.255.20.8 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/3
       description CORE to JNX-P (multivendor)
       ipv4 address 10.255.20.16 255.255.255.254
       no shutdown
      !
      router isis 1
       is-type level-2-only
       net 49.0002.0000.0000.2002.00
       address-family ipv4 unicast
        metric-style wide
       !
       interface Loopback0
        passive
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/2
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/3
        point-to-point
        address-family ipv4 unicast
      !
      mpls ldp
       router-id 10.0.20.2
       interface GigabitEthernet0/0/0/0
       interface GigabitEthernet0/0/0/1
       interface GigabitEthernet0/0/0/2
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: MgmtEth0/0/CPU0/0, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet0/0/0/0, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet0/0/0/1, type: physical}
      - {id: i3, slot: 3, label: GigabitEthernet0/0/0/2, type: physical}
      - {id: i4, slot: 4, label: GigabitEthernet0/0/0/3, type: physical}

  # --- Maple Ridge PE pair (mixed XR + IOS XE) ---------------------------------
  - id: n2
    label: MR-PE-R1
    node_definition: iosxrv9000
    x: -150
    y: -250
    tags: [region-b, maple-ridge, pe, xr]
    configuration: |-
      hostname MR-PE-R1
      domain name aurora.lab
      username labadmin
       group root-lr
       group cisco-support
       secret 10 __LABADMIN_SECRET__
      !
      ssh server v2
      ssh server vrf default
      !
      interface Loopback0
       ipv4 address 10.0.20.11 255.255.255.255
      !
      interface MgmtEth0/0/CPU0/0
       ipv4 address dhcp
       no shutdown
      !
      interface GigabitEthernet0/0/0/0
       description CORE to DC-P-R1
       ipv4 address 10.255.20.3 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description CORE to MR-PE-R2
       ipv4 address 10.255.20.11 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description PE-CE to MR-CE (VRF MAPLE-RIDGE via Ansible)
       no shutdown
      !
      router isis 1
       is-type level-2-only
       net 49.0002.0000.0000.2011.00
       address-family ipv4 unicast
        metric-style wide
       !
       interface Loopback0
        passive
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv4 unicast
      !
      mpls ldp
       router-id 10.0.20.11
       interface GigabitEthernet0/0/0/0
       interface GigabitEthernet0/0/0/1
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: MgmtEth0/0/CPU0/0, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet0/0/0/0, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet0/0/0/1, type: physical}
      - {id: i3, slot: 3, label: GigabitEthernet0/0/0/2, type: physical}

  - id: n3
    label: MR-PE-R2
    node_definition: cat8000v
    x: -150
    y: -100
    tags: [region-b, maple-ridge, pe, iosxe]
    configuration: |-
      hostname MR-PE-R2
      !
      ip domain name aurora.lab
      username labadmin privilege 15 secret __LABADMIN_SECRET__
      !
      interface Loopback0
       ip address 10.0.20.12 255.255.255.255
       ip router isis 1
      !
      interface GigabitEthernet1
       description MGMT
       ip address dhcp
       no shutdown
      !
      interface GigabitEthernet2
       description CORE to DC-P-R2
       ip address 10.255.20.5 255.255.255.254
       ip router isis 1
       isis network point-to-point
       mpls ip
       no shutdown
      !
      interface GigabitEthernet3
       description CORE to MR-PE-R1
       ip address 10.255.20.10 255.255.255.254
       ip router isis 1
       isis network point-to-point
       mpls ip
       no shutdown
      !
      interface GigabitEthernet4
       description PE-CE to MR-CE (VRF MAPLE-RIDGE via Ansible)
       no shutdown
      !
      router isis 1
       net 49.0002.0000.0000.2012.00
       is-type level-2-only
       metric-style wide
       passive-interface Loopback0
      !
      mpls ldp router-id Loopback0 force
      !
      line vty 0 4
       login local
       transport input ssh
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: GigabitEthernet1, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet2, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet3, type: physical}
      - {id: i3, slot: 3, label: GigabitEthernet4, type: physical}

  # --- Helix Health PE pair (pure XR) ------------------------------------------
  - id: n4
    label: HH-PE-R1
    node_definition: iosxrv9000
    x: -150
    y: 150
    tags: [region-b, helix, pe, xr]
    configuration: |-
      hostname HH-PE-R1
      domain name aurora.lab
      username labadmin
       group root-lr
       group cisco-support
       secret 10 __LABADMIN_SECRET__
      !
      ssh server v2
      ssh server vrf default
      !
      interface Loopback0
       ipv4 address 10.0.20.21 255.255.255.255
      !
      interface MgmtEth0/0/CPU0/0
       ipv4 address dhcp
       no shutdown
      !
      interface GigabitEthernet0/0/0/0
       description CORE to DC-P-R1
       ipv4 address 10.255.20.7 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description CORE to HH-PE-R2
       ipv4 address 10.255.20.12 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description PE-CE to HH-CE (PA-VM, local via bridge; VRF HELIX-HEALTH)
       no shutdown
      !
      router isis 1
       is-type level-2-only
       net 49.0002.0000.0000.2021.00
       address-family ipv4 unicast
        metric-style wide
       !
       interface Loopback0
        passive
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv4 unicast
      !
      mpls ldp
       router-id 10.0.20.21
       interface GigabitEthernet0/0/0/0
       interface GigabitEthernet0/0/0/1
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: MgmtEth0/0/CPU0/0, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet0/0/0/0, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet0/0/0/1, type: physical}
      - {id: i3, slot: 3, label: GigabitEthernet0/0/0/2, type: physical}

  - id: n5
    label: HH-PE-R2
    node_definition: iosxrv9000
    x: -150
    y: 300
    tags: [region-b, helix, pe, xr]
    configuration: |-
      hostname HH-PE-R2
      domain name aurora.lab
      username labadmin
       group root-lr
       group cisco-support
       secret 10 __LABADMIN_SECRET__
      !
      ssh server v2
      ssh server vrf default
      !
      interface Loopback0
       ipv4 address 10.0.20.22 255.255.255.255
      !
      interface MgmtEth0/0/CPU0/0
       ipv4 address dhcp
       no shutdown
      !
      interface GigabitEthernet0/0/0/0
       description CORE to DC-P-R2
       ipv4 address 10.255.20.9 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/1
       description CORE to HH-PE-R1
       ipv4 address 10.255.20.13 255.255.255.254
       no shutdown
      !
      interface GigabitEthernet0/0/0/2
       description PE-CE to HH-CE (PA-VM, local via bridge; VRF HELIX-HEALTH)
       no shutdown
      !
      interface GigabitEthernet0/0/0/3
       description PE-CE to JNX-FW (vSRX on Dell, local via bridge)
       no shutdown
      !
      router isis 1
       is-type level-2-only
       net 49.0002.0000.0000.2022.00
       address-family ipv4 unicast
        metric-style wide
       !
       interface Loopback0
        passive
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/0
        point-to-point
        address-family ipv4 unicast
       !
       interface GigabitEthernet0/0/0/1
        point-to-point
        address-family ipv4 unicast
      !
      mpls ldp
       router-id 10.0.20.22
       interface GigabitEthernet0/0/0/0
       interface GigabitEthernet0/0/0/1
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: MgmtEth0/0/CPU0/0, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet0/0/0/0, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet0/0/0/1, type: physical}
      - {id: i3, slot: 3, label: GigabitEthernet0/0/0/2, type: physical}
      - {id: i4, slot: 4, label: GigabitEthernet0/0/0/3, type: physical}

  # --- Maple Ridge CE (Cisco, runs natively in CML) ----------------------------
  - id: n6
    label: MR-CE
    node_definition: cat8000v
    x: 100
    y: -175
    tags: [region-b, maple-ridge, ce, zbfw]
    configuration: |-
      hostname MR-CE
      ip domain name aurora.lab
      username labadmin privilege 15 secret __LABADMIN_SECRET__
      !
      interface Loopback0
       ip address 10.0.21.1 255.255.255.255
      !
      interface GigabitEthernet1
       description MGMT
       ip address dhcp
       no shutdown
      !
      interface GigabitEthernet2
       description UPLINK to MR-PE-R1
       ip address 10.255.21.2 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet3
       description UPLINK to MR-PE-R2
       ip address 10.255.21.6 255.255.255.252
       no shutdown
      !
      line vty 0 4
       login local
       transport input ssh
      !
      end
    interfaces:
      - {id: i0, slot: 0, label: GigabitEthernet1, type: physical}
      - {id: i1, slot: 1, label: GigabitEthernet2, type: physical}
      - {id: i2, slot: 2, label: GigabitEthernet3, type: physical}

  # --- Local-Helix bridge: PA-VM CE + vSRX + Aruba LAN live on PC1/Dell --------
  # The PE-CE eBGP from the locally-hosted PA-VM (PC1 vrnetlab 9.0.4) and vSRX (Dell)
  # rides openconnect+MASQUERADE. Modelled here as an unmanaged switch fronting an
  # external connector. Set EXT-CONN's bridge to the reservation's egress per the MOP.
  - id: n7
    label: EXT-HELIX-BR
    node_definition: unmanaged_switch
    x: 100
    y: 225
    tags: [region-b, helix, bridge]
    interfaces:
      - {id: i0, slot: 0, label: port0, type: physical}
      - {id: i1, slot: 1, label: port1, type: physical}
      - {id: i2, slot: 2, label: port2, type: physical}
      - {id: i3, slot: 3, label: port3, type: physical}

  - id: n9
    label: EXT-CONN
    node_definition: external_connector
    x: 300
    y: 225
    tags: [region-b, bridge, egress]
    configuration: bridge0
    interfaces:
      - {id: i0, slot: 0, label: port, type: physical}

  # --- Multivendor core peer (the ONE BYOI node) -------------------------------
  - id: n8
    label: JNX-P
    node_definition: vjunos-router
    x: -650
    y: -100
    tags: [region-b, core, byoi, juniper, multivendor]
    configuration: |-
      # BYOI Juniper vJunos-router — multivendor IS-IS L2 + iBGP peer with the XR core.
      # Configure via Junos set-config / Ansible (junipernetworks.junos):
      #   lo0 10.0.20.31/32 ; ge-0/0/0 10.255.20.15/31 (DC-P-R1) ; ge-0/0/1 10.255.20.17/31 (DC-P-R2)
      #   IS-IS level 2, area 49.0002 ; LDP ; iBGP to RRs 10.0.20.1/.2 (AS 65002)
    interfaces:
      - {id: i0, slot: 0, label: fxp0, type: physical}
      - {id: i1, slot: 1, label: ge-0/0/0, type: physical}
      - {id: i2, slot: 2, label: ge-0/0/1, type: physical}

links:
  - {id: l0,  n1: n0, i1: i1, n2: n1, i2: i1}   # DC-P-R1 <-> DC-P-R2
  - {id: l1,  n1: n0, i1: i2, n2: n2, i2: i1}   # DC-P-R1 <-> MR-PE-R1
  - {id: l2,  n1: n1, i1: i2, n2: n3, i2: i1}   # DC-P-R2 <-> MR-PE-R2
  - {id: l3,  n1: n0, i1: i3, n2: n4, i2: i1}   # DC-P-R1 <-> HH-PE-R1
  - {id: l4,  n1: n1, i1: i3, n2: n5, i2: i1}   # DC-P-R2 <-> HH-PE-R2
  - {id: l5,  n1: n2, i1: i2, n2: n3, i2: i2}   # MR-PE-R1 <-> MR-PE-R2
  - {id: l6,  n1: n4, i1: i2, n2: n5, i2: i2}   # HH-PE-R1 <-> HH-PE-R2
  - {id: l7,  n1: n0, i1: i4, n2: n8, i2: i1}   # DC-P-R1 <-> JNX-P (vJunos BYOI)
  - {id: l8,  n1: n1, i1: i4, n2: n8, i2: i2}   # DC-P-R2 <-> JNX-P (vJunos BYOI)
  - {id: l9,  n1: n2, i1: i3, n2: n6, i2: i1}   # MR-PE-R1 <-> MR-CE
  - {id: l10, n1: n3, i1: i3, n2: n6, i2: i2}   # MR-PE-R2 <-> MR-CE
  # Helix CEs are local — bridged in via EXT-HELIX-BR -> EXT-CONN:
  - {id: l11, n1: n4, i1: i3, n2: n7, i2: i0}   # HH-PE-R1 -> bridge (to local PA-VM CE)
  - {id: l12, n1: n5, i1: i3, n2: n7, i2: i1}   # HH-PE-R2 -> bridge (to local PA-VM CE)
  - {id: l13, n1: n5, i1: i4, n2: n7, i2: i2}   # HH-PE-R2 -> bridge (to local vSRX)
  - {id: l14, n1: n7, i1: i3, n2: n9, i2: i0}   # bridge -> external connector (egress)
