<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1020" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1480" height="1020" fill="#ffffff"/>
  <text x="40" y="34" font-size="22" font-weight="700" fill="#0f172a">Aurora Communications — Region A (v2.0): Cisco P/PE Core on Dell GNS3</text>
  <text x="40" y="56" font-size="13" fill="#475569">IS-IS L2 + MPLS LDP · iBGP VPNv4 full mesh · MPLS L3VPN (VRF CUST-A) · Simulated Internet Edge + IXP + lab RPKI/ROV · doc ASNs/prefixes (RFC 5398/5737/3849)</text>

  <!-- ===================== TIER BANDS ===================== -->
  <rect x="40" y="72" width="1080" height="216" rx="10" fill="#f5f3ff" stroke="#7e22ce"/>
  <text x="54" y="92" font-size="13" font-weight="700" fill="#581c87">🌐 Internet Edge — simulated (documentation ASNs / prefixes; never advertised to the real Internet)</text>

  <rect x="40" y="304" width="1080" height="206" rx="10" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="54" y="324" font-size="13" font-weight="700" fill="#1e3a8a">Aurora AS 64496 — Cisco P/PE core (IS-IS L2 + LDP transport, iBGP VPNv4 full mesh, MPLS L3VPN)</text>

  <rect x="40" y="526" width="1080" height="170" rx="10" fill="#fff7ed" stroke="#f97316"/>
  <text x="54" y="546" font-size="13" font-weight="700" fill="#9a3412">Customer Edge</text>

  <rect x="40" y="712" width="1080" height="150" rx="10" fill="#fefce8" stroke="#ca8a04"/>
  <text x="54" y="732" font-size="13" font-weight="700" fill="#854d0e">Tenant workloads (docker)</text>

  <!-- Right panel: management / RPKI / legend -->
  <rect x="1140" y="72" width="300" height="790" rx="10" fill="#f8fafc" stroke="#64748b"/>
  <text x="1154" y="92" font-size="13" font-weight="700" fill="#334155">PC1 / Management / RPKI</text>

  <!-- ===================== LINKS (drawn before nodes) ===================== -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <!-- transit -> PE -->
    <line x1="170" y1="232" x2="250" y2="360"/>
    <line x1="950" y1="232" x2="900" y2="360"/>
    <!-- IXP fabric -> PE-1 / PE-3 -->
    <line x1="520" y1="252" x2="280" y2="360"/>
    <line x1="600" y1="252" x2="880" y2="360"/>
    <!-- PE -> P (IS-IS/LDP) -->
    <line x1="280" y1="404" x2="540" y2="404"/>
    <line x1="690" y1="430" x2="600" y2="430"/>
    <line x1="880" y1="404" x2="660" y2="404"/>
  </g>
  <!-- iBGP VPNv4 full mesh (dashed) -->
  <g stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="5 4" fill="none">
    <path d="M 280 350 Q 580 300 880 350"/>
    <line x1="280" y1="392" x2="690" y2="392"/>
    <line x1="690" y1="392" x2="880" y2="392"/>
  </g>
  <!-- PE -> CE -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <line x1="250" y1="448" x2="250" y2="566"/>
    <line x1="600" y1="470" x2="600" y2="566"/>
    <line x1="900" y1="448" x2="900" y2="566"/>
  </g>
  <!-- CE -> workloads -->
  <g stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 3" fill="none">
    <line x1="250" y1="654" x2="250" y2="752"/>
    <line x1="600" y1="654" x2="600" y2="752"/>
  </g>
  <!-- RPKI-RTR feed to PE-3 -->
  <path d="M 1140 470 Q 1010 500 905 448" stroke="#0d9488" stroke-width="1.6" stroke-dasharray="4 4" fill="none"/>

  <!-- ===================== INTERNET EDGE NODES ===================== -->
  <!-- transit-a -->
  <g>
    <rect x="100" y="150" width="150" height="82" rx="8" fill="#6a1b9a"/>
    <text x="175" y="172" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">transit-a-csr</text>
    <text x="175" y="190" font-size="11" fill="#e9d5ff" text-anchor="middle">CSR1000v · AS 64497</text>
    <text x="175" y="206" font-size="10" fill="#e9d5ff" text-anchor="middle">primary transit</text>
    <text x="175" y="221" font-size="10" fill="#e9d5ff" text-anchor="middle">0.0.0.0/0 + ::/0</text>
  </g>
  <!-- transit-b -->
  <g>
    <rect x="875" y="150" width="150" height="82" rx="8" fill="#6a1b9a"/>
    <text x="950" y="172" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">transit-b-iol</text>
    <text x="950" y="190" font-size="11" fill="#e9d5ff" text-anchor="middle">IOL-XE · AS 64498</text>
    <text x="950" y="206" font-size="10" fill="#e9d5ff" text-anchor="middle">backup transit</text>
    <text x="950" y="221" font-size="10" fill="#e9d5ff" text-anchor="middle">0.0.0.0/0 (backup)</text>
  </g>
  <!-- IXP fabric -->
  <g>
    <rect x="470" y="206" width="180" height="46" rx="8" fill="#0f766e"/>
    <text x="560" y="226" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">ixp-fabric</text>
    <text x="560" y="242" font-size="10" fill="#ccfbf1" text-anchor="middle">Melbourne IXP · L2 LAN</text>
  </g>
  <!-- IXP RS / content / eyeball -->
  <g>
    <rect x="330" y="112" width="150" height="66" rx="8" fill="#0d9488"/>
    <text x="405" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ixp-rs1 (FRR)</text>
    <text x="405" y="148" font-size="10" fill="#ccfbf1" text-anchor="middle">route server</text>
    <text x="405" y="163" font-size="10" fill="#ccfbf1" text-anchor="middle">AS 64499</text>
  </g>
  <g>
    <rect x="495" y="112" width="150" height="66" rx="8" fill="#0d9488"/>
    <text x="570" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ixp-content1</text>
    <text x="570" y="148" font-size="10" fill="#ccfbf1" text-anchor="middle">CDN · AS 64500</text>
    <text x="570" y="163" font-size="10" fill="#ccfbf1" text-anchor="middle">198.51.100.0/25</text>
  </g>
  <g>
    <rect x="660" y="112" width="150" height="66" rx="8" fill="#0d9488"/>
    <text x="735" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ixp-eyeball1</text>
    <text x="735" y="148" font-size="10" fill="#ccfbf1" text-anchor="middle">eyeball · AS 64501</text>
    <text x="735" y="163" font-size="10" fill="#ccfbf1" text-anchor="middle">198.51.100.128/25</text>
  </g>

  <!-- ===================== CORE NODES ===================== -->
  <!-- Aurora-P -->
  <g>
    <rect x="540" y="360" width="120" height="92" rx="8" fill="#1ba0d7"/>
    <text x="600" y="384" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Aurora-P</text>
    <text x="600" y="401" font-size="10" fill="#e0f2fe" text-anchor="middle">IOL-AdvEnt-L3</text>
    <text x="600" y="416" font-size="10" fill="#e0f2fe" text-anchor="middle">Lo0 10.0.0.1</text>
    <text x="600" y="431" font-size="10" fill="#e0f2fe" text-anchor="middle">IS-IS/LDP only</text>
    <text x="600" y="446" font-size="10" fill="#e0f2fe" text-anchor="middle">(no BGP)</text>
  </g>
  <!-- PE-1 -->
  <g>
    <rect x="170" y="350" width="150" height="96" rx="8" fill="#1ba0d7"/>
    <text x="245" y="372" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Aurora-PE-1</text>
    <text x="245" y="389" font-size="10" fill="#e0f2fe" text-anchor="middle">IOL-AdvEnt-L3</text>
    <text x="245" y="404" font-size="10" fill="#e0f2fe" text-anchor="middle">Lo0 10.0.0.2</text>
    <text x="245" y="419" font-size="10" fill="#e0f2fe" text-anchor="middle">L3VPN PE</text>
    <text x="245" y="434" font-size="10" fill="#e0f2fe" text-anchor="middle">Northwind + Transit-A + IXP</text>
  </g>
  <!-- PE-2 -->
  <g>
    <rect x="690" y="392" width="150" height="96" rx="8" fill="#1ba0d7"/>
    <text x="765" y="414" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Aurora-PE-2</text>
    <text x="765" y="431" font-size="10" fill="#e0f2fe" text-anchor="middle">IOL-AdvEnt-L3</text>
    <text x="765" y="446" font-size="10" fill="#e0f2fe" text-anchor="middle">Lo0 10.0.0.3</text>
    <text x="765" y="461" font-size="10" fill="#e0f2fe" text-anchor="middle">L3VPN PE</text>
    <text x="765" y="476" font-size="10" fill="#e0f2fe" text-anchor="middle">Helix LAN VRF</text>
  </g>
  <!-- PE-3 -->
  <g>
    <rect x="830" y="350" width="150" height="96" rx="8" fill="#1565c0"/>
    <text x="905" y="372" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Aurora-PE-3</text>
    <text x="905" y="389" font-size="10" fill="#dbeafe" text-anchor="middle">IOS-XRv 6.1.3</text>
    <text x="905" y="404" font-size="10" fill="#dbeafe" text-anchor="middle">Lo0 10.0.0.4</text>
    <text x="905" y="419" font-size="10" fill="#dbeafe" text-anchor="middle">Transit-B + IXP</text>
    <text x="905" y="434" font-size="10" fill="#dbeafe" text-anchor="middle">ROV enforcer (C1)</text>
  </g>

  <!-- ===================== CUSTOMER EDGE ===================== -->
  <g>
    <rect x="175" y="566" width="150" height="80" rx="8" fill="#ee3124"/>
    <text x="250" y="588" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">northwind-ce</text>
    <text x="250" y="605" font-size="10" fill="#fee2e2" text-anchor="middle">FortiGate 7.0.14</text>
    <text x="250" y="620" font-size="10" fill="#fee2e2" text-anchor="middle">AS 64512 (private CE)</text>
    <text x="250" y="635" font-size="10" fill="#fee2e2" text-anchor="middle">eBGP → PE-1</text>
  </g>
  <g>
    <rect x="525" y="566" width="150" height="80" rx="8" fill="#f97316"/>
    <text x="600" y="588" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">helix-lan-sw</text>
    <text x="600" y="605" font-size="10" fill="#ffedd5" text-anchor="middle">Aruba CX 10.16</text>
    <text x="600" y="620" font-size="10" fill="#ffedd5" text-anchor="middle">VLAN 100/200</text>
    <text x="600" y="635" font-size="10" fill="#ffedd5" text-anchor="middle">trunk → PE-2 VRF</text>
  </g>
  <g>
    <rect x="825" y="566" width="150" height="80" rx="8" fill="#42a5f5"/>
    <text x="900" y="588" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">region-a-ce-spare</text>
    <text x="900" y="605" font-size="10" fill="#e3f2fd" text-anchor="middle">IOSv 15.7 (CE-only)</text>
    <text x="900" y="620" font-size="10" fill="#e3f2fd" text-anchor="middle">optional / on-demand</text>
    <text x="900" y="635" font-size="10" fill="#e3f2fd" text-anchor="middle">eBGP → PE-3</text>
  </g>

  <!-- ===================== WORKLOADS ===================== -->
  <g font-size="10" fill="#713f12" text-anchor="middle">
    <rect x="120" y="752" width="120" height="40" rx="6" fill="#fde047"/><text x="180" y="770" font-weight="700">northwind-saas</text><text x="180" y="784">nginx</text>
    <rect x="250" y="752" width="110" height="40" rx="6" fill="#fde047"/><text x="305" y="770" font-weight="700">northwind-redis</text><text x="305" y="784">+ prometheus/grafana</text>
    <rect x="500" y="752" width="110" height="40" rx="6" fill="#fde047"/><text x="555" y="770" font-weight="700">helix-orthanc</text><text x="555" y="784">DICOM</text>
    <rect x="620" y="752" width="110" height="40" rx="6" fill="#fde047"/><text x="675" y="770" font-weight="700">helix-emr</text><text x="675" y="784">nginx + doctor-wks</text>
  </g>
  <text x="560" y="826" font-size="11" fill="#854d0e">Maple Ridge workloads live in Region B (DevNet CML) — not in Region A.</text>

  <!-- ===================== RIGHT PANEL CONTENT ===================== -->
  <g>
    <rect x="1160" y="108" width="260" height="78" rx="8" fill="#455a64"/>
    <text x="1290" y="130" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">rpki-rp1 · Routinator (on PC1)</text>
    <text x="1290" y="148" font-size="10" fill="#cfd8dc" text-anchor="middle">RPKI-RTR → 192.168.200.1:3323</text>
    <text x="1290" y="164" font-size="10" fill="#cfd8dc" text-anchor="middle">SLURM lab VRPs (RFC 8416)</text>
    <text x="1290" y="180" font-size="10" fill="#cfd8dc" text-anchor="middle">ROV enforce first @ PE-3</text>
  </g>
  <g>
    <rect x="1160" y="200" width="260" height="58" rx="8" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="1170" y="220" font-size="11" font-weight="700" fill="#334155">Mgmt segment</text>
    <text x="1170" y="237" font-size="10" fill="#475569">nodes 192.168.200.11–16/24</text>
    <text x="1170" y="251" font-size="10" fill="#475569">GNS3 ctrl 192.168.200.2:3080</text>
  </g>

  <!-- Legend -->
  <text x="1160" y="290" font-size="12" font-weight="700" fill="#334155">Legend</text>
  <g font-size="11" fill="#334155">
    <rect x="1160" y="300" width="20" height="14" rx="3" fill="#1ba0d7"/><text x="1188" y="312">Cisco IOL-AdvEnterprise-L3 (P/PE)</text>
    <rect x="1160" y="322" width="20" height="14" rx="3" fill="#1565c0"/><text x="1188" y="334">Cisco IOS-XRv 6.1.3 (PE-3)</text>
    <rect x="1160" y="344" width="20" height="14" rx="3" fill="#42a5f5"/><text x="1188" y="356">Cisco IOSv (spare CE)</text>
    <rect x="1160" y="366" width="20" height="14" rx="3" fill="#6a1b9a"/><text x="1188" y="378">Cisco transit (CSR / IOL-XE)</text>
    <rect x="1160" y="388" width="20" height="14" rx="3" fill="#0d9488"/><text x="1188" y="400">FRR IXP (RS / content / eyeball)</text>
    <rect x="1160" y="410" width="20" height="14" rx="3" fill="#ee3124"/><text x="1188" y="422">Fortinet FortiGate (Northwind CE)</text>
    <rect x="1160" y="432" width="20" height="14" rx="3" fill="#f97316"/><text x="1188" y="444">Aruba CX (Helix LAN)</text>
    <rect x="1160" y="454" width="20" height="14" rx="3" fill="#fde047"/><text x="1188" y="466">Tenant workload (docker)</text>
    <rect x="1160" y="476" width="20" height="14" rx="3" fill="#455a64"/><text x="1188" y="488">Management / RPKI (PC1)</text>
  </g>
  <g font-size="11" fill="#334155">
    <line x1="1160" y1="512" x2="1190" y2="512" stroke="#64748b" stroke-width="2"/><text x="1196" y="516">link (IS-IS/LDP, eBGP)</text>
    <line x1="1160" y1="532" x2="1190" y2="532" stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="5 4"/><text x="1196" y="536">iBGP VPNv4 (full mesh)</text>
    <line x1="1160" y1="552" x2="1190" y2="552" stroke="#0d9488" stroke-width="1.6" stroke-dasharray="4 4"/><text x="1196" y="556">RPKI-RTR feed</text>
  </g>

  <!-- Archived note -->
  <g>
    <rect x="1160" y="586" width="260" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="1170" y="606" font-size="11" font-weight="700" fill="#991b1b">Archived (ADR-003)</text>
    <text x="1170" y="624" font-size="10" fill="#7f1d1d">Nokia core retired: SR Linux P +</text>
    <text x="1170" y="638" font-size="10" fill="#7f1d1d">SR OS PE-1/PE-2 → cold-stored,</text>
    <text x="1170" y="652" font-size="10" fill="#7f1d1d">recoverable (license preserved).</text>
    <text x="1170" y="672" font-size="10" fill="#7f1d1d">Juniper → Region B (vSRX/vJunos)</text>
    <text x="1170" y="686" font-size="10" fill="#7f1d1d">+ cloud cRPD; vSRX standalone-</text>
    <text x="1170" y="700" font-size="10" fill="#7f1d1d">local for practice.</text>
  </g>

  <text x="1160" y="736" font-size="10" fill="#64748b">Policy: IXP(300) &gt; Transit-A(200) &gt;</text>
  <text x="1160" y="750" font-size="10" fill="#64748b">Transit-B(100); RPKI-invalid dropped;</text>
  <text x="1160" y="764" font-size="10" fill="#64748b">no transit↔IXP leak; max-prefix cap.</text>

  <text x="40" y="894" font-size="11" fill="#94a3b8">Source: docs/region-a-plan.md v2.0 · docs/adr-003-revendor-cisco-region-a.md · GNS3 project "ops-lab" on Dell (192.168.200.2:3080)</text>
</svg>
