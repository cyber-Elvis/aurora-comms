<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1020" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1480" height="1020" fill="#ffffff"/>
  <text x="40" y="34" font-size="22" font-weight="700" fill="#0f172a">Aurora Communications — Region A (v2.5): ADL-GEL-MEL-PE1-MEL-P Geographic Layout</text>
  <text x="40" y="56" font-size="13" fill="#475569">IS-IS L2 + MPLS LDP · iBGP VPNv4 full mesh · MEL-P right-side handoff to PC1/SYD-PE1 · doc ASNs/prefixes (RFC 5398/5737/3849)</text>

  <!-- ===================== TIER BANDS ===================== -->
  <rect x="40" y="72" width="1080" height="216" rx="10" fill="#f5f3ff" stroke="#7e22ce"/>
  <text x="54" y="92" font-size="13" font-weight="700" fill="#581c87">🌐 Internet Edge — simulated (documentation ASNs / prefixes; never advertised to the real Internet)</text>

  <rect x="40" y="304" width="1080" height="206" rx="10" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="54" y="324" font-size="13" font-weight="700" fill="#1e3a8a">Aurora AS 64496 — Cisco P/PE core (IS-IS L2 + LDP transport, iBGP VPNv4 full mesh, MPLS L3VPN)</text>

  <rect x="40" y="526" width="1080" height="170" rx="10" fill="#fff7ed" stroke="#f97316"/>
  <text x="54" y="546" font-size="13" font-weight="700" fill="#9a3412">Customer Edge</text>

  <rect x="40" y="712" width="1080" height="150" rx="10" fill="#fefce8" stroke="#ca8a04"/>
  <text x="54" y="732" font-size="13" font-weight="700" fill="#854d0e">Tenant workloads (Region B/PC1 Docker offload)</text>

  <!-- Right panel: management / RPKI / legend -->
  <rect x="1140" y="72" width="300" height="790" rx="10" fill="#f8fafc" stroke="#64748b"/>
  <text x="1154" y="92" font-size="13" font-weight="700" fill="#334155">PC1 / Management / RPKI</text>

  <!-- ===================== LINKS (drawn before nodes) ===================== -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <!-- transit -> Region A PEs -->
    <line x1="170" y1="232" x2="605" y2="350"/>
    <line x1="950" y1="232" x2="175" y2="350"/>
    <!-- IXP fabric -> PE-1 -->
    <line x1="520" y1="252" x2="605" y2="350"/>
    <!-- ADL / GEL / MEL-PE1 / MEL-P (IS-IS/LDP) -->
    <line x1="250" y1="404" x2="315" y2="430"/>
    <line x1="465" y1="430" x2="530" y2="404"/>
    <line x1="680" y1="404" x2="760" y2="404"/>
    <line x1="880" y1="404" x2="920" y2="404" stroke-dasharray="6 4"/>
  </g>
  <!-- iBGP VPNv4 full mesh (dashed) -->
  <g stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="5 4" fill="none">
    <path d="M 175 350 Q 390 300 605 350"/>
    <line x1="175" y1="392" x2="390" y2="392"/>
    <line x1="390" y1="392" x2="605" y2="392"/>
  </g>
  <!-- PE -> CE -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <line x1="605" y1="448" x2="605" y2="566"/>
    <line x1="390" y1="470" x2="390" y2="566"/>
    <line x1="175" y1="448" x2="175" y2="566"/>
  </g>
  <!-- CE -> workloads -->
  <g stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 3" fill="none">
    <line x1="605" y1="654" x2="605" y2="752"/>
    <line x1="390" y1="654" x2="390" y2="752"/>
  </g>
  <!-- RPKI-RTR feed goes to Region B SYD-PE1 when built -->

  <!-- ===================== INTERNET EDGE NODES ===================== -->
  <!-- transit-a -->
  <g>
    <image href="assets/topology-photos/generated/transit-a-photo.jpg" x="100" y="150" width="150" height="82" preserveAspectRatio="xMidYMid slice"/>
    <rect x="100" y="150" width="150" height="82" rx="8" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  </g>
  <!-- transit-b -->
  <g>
    <image href="assets/topology-photos/generated/transit-b-photo.jpg" x="875" y="150" width="150" height="82" preserveAspectRatio="xMidYMid slice"/>
    <rect x="875" y="150" width="150" height="82" rx="8" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  </g>
  <!-- IXP fabric -->
  <g>
    <rect x="470" y="206" width="180" height="46" rx="8" fill="#0f766e"/>
    <image href="assets/topology-icons/ixp-fabric.svg" x="480" y="214" width="34" height="24" preserveAspectRatio="xMidYMid meet"/>
    <text x="560" y="226" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">ixp-fabric</text>
    <text x="560" y="242" font-size="10" fill="#ccfbf1" text-anchor="middle">Melbourne IXP · L2 LAN</text>
  </g>
  <!-- IXP RS / content / eyeball -->
  <g>
    <rect x="330" y="112" width="150" height="66" rx="8" fill="#0d9488"/>
    <image href="assets/topology-icons/frr-router.svg" x="338" y="120" width="32" height="22" preserveAspectRatio="xMidYMid meet"/>
    <text x="405" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ixp-rs1 (FRR)</text>
    <text x="405" y="148" font-size="10" fill="#ccfbf1" text-anchor="middle">route server</text>
    <text x="405" y="163" font-size="10" fill="#ccfbf1" text-anchor="middle">B/PC1 Docker</text>
  </g>
  <g>
    <rect x="495" y="112" width="150" height="66" rx="8" fill="#0d9488"/>
    <image href="assets/topology-icons/frr-router.svg" x="503" y="120" width="32" height="22" preserveAspectRatio="xMidYMid meet"/>
    <text x="570" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ixp-content1</text>
    <text x="570" y="148" font-size="10" fill="#ccfbf1" text-anchor="middle">CDN · AS 64500</text>
    <text x="570" y="163" font-size="10" fill="#ccfbf1" text-anchor="middle">B/PC1 Docker</text>
  </g>
  <g>
    <rect x="660" y="112" width="150" height="66" rx="8" fill="#0d9488"/>
    <image href="assets/topology-icons/frr-router.svg" x="668" y="120" width="32" height="22" preserveAspectRatio="xMidYMid meet"/>
    <text x="735" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ixp-eyeball1</text>
    <text x="735" y="148" font-size="10" fill="#ccfbf1" text-anchor="middle">eyeball · AS 64501</text>
    <text x="735" y="163" font-size="10" fill="#ccfbf1" text-anchor="middle">B/PC1 Docker</text>
  </g>

  <!-- ===================== CORE NODES ===================== -->
  <!-- ADL-PE1 -->
  <g>
    <image href="assets/topology-photos/generated/adl-pe1-photo.jpg" x="100" y="350" width="150" height="96" preserveAspectRatio="xMidYMid slice"/>
    <rect x="100" y="350" width="150" height="96" rx="8" fill="none" stroke="#1ba0d7" stroke-width="2"/>
  </g>
  <!-- GEL-PE1 -->
  <g>
    <image href="assets/topology-photos/generated/gel-pe1-photo.jpg" x="315" y="392" width="150" height="96" preserveAspectRatio="xMidYMid slice"/>
    <rect x="315" y="392" width="150" height="96" rx="8" fill="none" stroke="#1ba0d7" stroke-width="2"/>
  </g>
  <!-- PE-1 -->
  <g>
    <image href="assets/topology-photos/generated/mel-pe1-photo.jpg" x="530" y="350" width="150" height="96" preserveAspectRatio="xMidYMid slice"/>
    <rect x="530" y="350" width="150" height="96" rx="8" fill="none" stroke="#1ba0d7" stroke-width="2"/>
  </g>
  <!-- Aurora-P -->
  <g>
    <image href="assets/topology-photos/generated/mel-p-photo.jpg" x="760" y="360" width="120" height="92" preserveAspectRatio="xMidYMid slice"/>
    <rect x="760" y="360" width="120" height="92" rx="8" fill="none" stroke="#1ba0d7" stroke-width="2"/>
  </g>
  <!-- PC1 / Region B logical handoff -->
  <g>
    <image href="assets/topology-photos/generated/syd-pe1-photo.jpg" x="920" y="350" width="180" height="96" preserveAspectRatio="xMidYMid slice"/>
    <rect x="920" y="350" width="180" height="96" rx="8" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
  </g>

  <!-- ===================== CUSTOMER EDGE ===================== -->
  <g>
    <image href="assets/topology-photos/generated/northwind-ce-photo.jpg" x="530" y="566" width="150" height="80" preserveAspectRatio="xMidYMid slice"/>
    <rect x="530" y="566" width="150" height="80" rx="8" fill="none" stroke="#ee3124" stroke-width="2"/>
  </g>
  <g>
    <rect x="315" y="566" width="150" height="80" rx="8" fill="#f97316"/>
    <image href="assets/topology-icons/aruba-switch.svg" x="323" y="574" width="34" height="24" preserveAspectRatio="xMidYMid meet"/>
    <text x="390" y="588" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">helix-lan-sw</text>
    <text x="390" y="605" font-size="10" fill="#ffedd5" text-anchor="middle">Aruba CX 10.16</text>
    <text x="390" y="620" font-size="10" fill="#ffedd5" text-anchor="middle">VLAN 100/200</text>
    <text x="390" y="635" font-size="10" fill="#ffedd5" text-anchor="middle">local access practice</text>
  </g>
  <g>
    <image href="assets/topology-photos/generated/spare-ce-photo.jpg" x="100" y="566" width="150" height="80" preserveAspectRatio="xMidYMid slice"/>
    <rect x="100" y="566" width="150" height="80" rx="8" fill="none" stroke="#42a5f5" stroke-width="2"/>
  </g>

  <!-- ===================== WORKLOADS ===================== -->
  <g font-size="10" fill="#713f12" text-anchor="middle">
    <rect x="475" y="752" width="120" height="40" rx="6" fill="#fde047"/><image href="assets/topology-icons/docker-workload.svg" x="480" y="758" width="24" height="18" preserveAspectRatio="xMidYMid meet"/><text x="545" y="770" font-weight="700">northwind-saas</text><text x="545" y="784">nginx</text>
    <rect x="605" y="752" width="110" height="40" rx="6" fill="#fde047"/><image href="assets/topology-icons/docker-workload.svg" x="610" y="758" width="24" height="18" preserveAspectRatio="xMidYMid meet"/><text x="668" y="770" font-weight="700">northwind-redis</text><text x="668" y="784">+ prometheus/grafana</text>
    <rect x="290" y="752" width="110" height="40" rx="6" fill="#fde047"/><image href="assets/topology-icons/docker-workload.svg" x="295" y="758" width="24" height="18" preserveAspectRatio="xMidYMid meet"/><text x="353" y="770" font-weight="700">helix-orthanc</text><text x="353" y="784">DICOM</text>
    <rect x="410" y="752" width="110" height="40" rx="6" fill="#fde047"/><image href="assets/topology-icons/docker-workload.svg" x="415" y="758" width="24" height="18" preserveAspectRatio="xMidYMid meet"/><text x="473" y="770" font-weight="700">helix-emr</text><text x="473" y="784">nginx + doctor-wks</text>
  </g>
  <text x="560" y="826" font-size="11" fill="#854d0e">Workload containers are Region B/PC1 Docker offload; local Region A keeps router/firewall nodes and both transits.</text>

  <!-- ===================== RIGHT PANEL CONTENT ===================== -->
  <g>
    <rect x="1160" y="108" width="260" height="78" rx="8" fill="#455a64"/>
    <image href="assets/topology-icons/pc-management.svg" x="1170" y="118" width="36" height="26" preserveAspectRatio="xMidYMid meet"/>
    <text x="1290" y="130" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">rpki-rp1 · Routinator (on PC1)</text>
    <text x="1290" y="148" font-size="10" fill="#cfd8dc" text-anchor="middle">RPKI-RTR → 192.168.137.1:3323</text>
    <text x="1290" y="164" font-size="10" fill="#cfd8dc" text-anchor="middle">SLURM lab VRPs (RFC 8416)</text>
    <text x="1290" y="180" font-size="10" fill="#cfd8dc" text-anchor="middle">ROV first @ Region B SYD-PE1</text>
  </g>
  <g>
    <rect x="1160" y="200" width="260" height="58" rx="8" fill="#e2e8f0" stroke="#94a3b8"/>
    <image href="assets/topology-icons/gns3-cloud.svg" x="1378" y="214" width="34" height="24" preserveAspectRatio="xMidYMid meet"/>
    <text x="1170" y="220" font-size="11" font-weight="700" fill="#334155">Mgmt segment</text>
    <text x="1170" y="237" font-size="10" fill="#475569">nodes 10.255.191.11–17/24</text>
    <text x="1170" y="251" font-size="10" fill="#475569">GNS3 ctrl 192.168.137.2:3080</text>
  </g>
  <text x="1160" y="274" font-size="10" fill="#475569">Dell/PC2 canvas: ADL → GEL → MEL-PE1 → MEL-P</text>
  <text x="1160" y="288" font-size="10" fill="#475569">Transit-B is local backup via ADL-PE1; SYD stays ROV/Region B edge</text>

  <!-- Legend -->
  <text x="1160" y="310" font-size="12" font-weight="700" fill="#334155">Legend</text>
  <g font-size="11" fill="#334155">
    <rect x="1160" y="320" width="20" height="14" rx="3" fill="#1ba0d7"/><text x="1188" y="332">Cisco IOS-XRv 6.1.3 (Region A P/PE)</text>
    <rect x="1160" y="342" width="20" height="14" rx="3" fill="#1565c0"/><text x="1188" y="354">Region B IOS-XRv SYD-PE1</text>
    <rect x="1160" y="364" width="20" height="14" rx="3" fill="#42a5f5"/><text x="1188" y="376">Cisco IOSv (spare CE)</text>
    <rect x="1160" y="386" width="20" height="14" rx="3" fill="#6a1b9a"/><text x="1188" y="398">Cisco transit (CSR / IOL-XE)</text>
    <rect x="1160" y="408" width="20" height="14" rx="3" fill="#0d9488"/><text x="1188" y="420">FRR IXP (Region B/PC1 Docker)</text>
    <rect x="1160" y="430" width="20" height="14" rx="3" fill="#ee3124"/><text x="1188" y="442">Fortinet FortiGate (Northwind CE)</text>
    <rect x="1160" y="452" width="20" height="14" rx="3" fill="#f97316"/><text x="1188" y="464">Aruba CX (Helix LAN)</text>
    <rect x="1160" y="474" width="20" height="14" rx="3" fill="#fde047"/><text x="1188" y="486">Tenant workload (B/PC1 Docker)</text>
    <rect x="1160" y="496" width="20" height="14" rx="3" fill="#455a64"/><text x="1188" y="508">Management / RPKI (PC1)</text>
  </g>
  <g font-size="11" fill="#334155">
    <line x1="1160" y1="532" x2="1190" y2="532" stroke="#64748b" stroke-width="2"/><text x="1196" y="536">link (IS-IS/LDP, eBGP)</text>
    <line x1="1160" y1="552" x2="1190" y2="552" stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="5 4"/><text x="1196" y="556">iBGP VPNv4 (full mesh)</text>
    <line x1="1160" y1="572" x2="1190" y2="572" stroke="#0d9488" stroke-width="1.6" stroke-dasharray="4 4"/><text x="1196" y="576">RPKI-RTR feed</text>
  </g>

  <!-- Archived note -->
  <g>
    <rect x="1160" y="586" width="260" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="1170" y="606" font-size="11" font-weight="700" fill="#991b1b">Archived (ADR-003)</text>
    <text x="1170" y="624" font-size="10" fill="#7f1d1d">Nokia core retired: SR Linux P +</text>
    <text x="1170" y="638" font-size="10" fill="#7f1d1d">SR OS PE-1/PE-2 → cold-stored,</text>
    <text x="1170" y="652" font-size="10" fill="#7f1d1d">recoverable (license preserved).</text>
    <text x="1170" y="672" font-size="10" fill="#7f1d1d">Juniper → Region B (vSRX/vJunos)</text>
    <text x="1170" y="686" font-size="10" fill="#7f1d1d">+ cloud cRPD; vSRX standalone-</text>
    <text x="1170" y="700" font-size="10" fill="#7f1d1d">local for practice.</text>
  </g>

  <text x="1160" y="736" font-size="10" fill="#64748b">Policy: IXP(300) &gt; Transit-A(200) &gt;</text>
  <text x="1160" y="750" font-size="10" fill="#64748b">Transit-B(100); RPKI-invalid dropped;</text>
  <text x="1160" y="764" font-size="10" fill="#64748b">no transit↔IXP leak; max-prefix cap.</text>

  <text x="40" y="894" font-size="11" fill="#94a3b8">Source: docs/region-a-plan.md v2.5 · docs/adr-003-revendor-cisco-region-a.md · GNS3 project "ops-lab" on Dell (192.168.137.2:3080)</text>
</svg>
