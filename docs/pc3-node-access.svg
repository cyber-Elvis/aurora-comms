xt-anchor="start">labadmin only (tiers TBD)</text><text x="998" y="899" fill="#334155" font-family="Helvetica" font-size="17" font-weight="bold" text-anchor="start">Never</text><text x="1210" y="899" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">reuse a credential</text><rect width="405" height="300" x="1460" y="660" fill="#f4f7fb" fill-opacity="1" stroke="#c3d0e0" stroke-width="1.6" rx="12" ry="12"/><rect width="405" height="38" x="1460" y="660" fill="#6a1b9a" fill-opacity="1" stroke="none" stroke-width="0" rx="12" ry="12"/><rect width="405" height="19" x="1460" y="679" fill="#6a1b9a" fill-opacity="1" stroke="none" stroke-width="0" rx="0" ry="0"/><text x="1478" y="687" fill="#fff" font-family="Helvetica" font-size="19" font-weight="bold" text-anchor="start">Console ports (telnet GNS3 VM)</text><text x="1478" y="734" fill="#334155" font-family="Helvetica" font-size="17" font-weight="bold" text-anchor="start">transit-a-csr</text><text x="1690" y="734" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">:5009</text><text x="1478" y="767" fill="#334155" font-family="Helvetica" font-size="17" font-weight="bold" text-anchor="start">transit-b-iol</text><text x="1690" y="767" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">:5013</text><text x="1478" y="800" fill="#334155" font-family="Helvetica" font-size="17" font-weight="bold" text-anchor="start">IOS-XR nodes</text><text x="1690" y="800" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">per-node - see GNS3</text><text x="1478" y="833" fill="#334155" font-family="Helvetica" font-size="17" font-weight="bold" text-anchor="start">Use when</text><text x="1690" y="833" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">no SSH yet / locked out</text><text x="1478" y="866" fill="#334155" font-family="Helvetica" font-size="17" font-weight="bold" text-anchor="start">Then</text><text x="1690" y="866" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">switch to SSH;</text><text x="1478" y="899" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">console = break-glass</text><text x="55" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="20" font-weight="bold" text-anchor="start">Legend</text><line x1="170" x2="220" y1="986" y2="986" stroke="#1d4ed8" stroke-width="4.5"/><text x="232" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">(1) SSH ProxyJump -&gt; node mgmt :22</text><line x1="640" x2="690" y1="986" y2="986" stroke="#b45309" stroke-dasharray="9 6" stroke-width="4.5"/><text x="702" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="17" text-anchor="start">(2) telnet -&gt; GNS3 VM console port</text><rect width="26" height="18" x="1120" y="974" fill="#0e7490" fill-opacity="1" stroke="#cbd5e1" stroke-width="1" rx="3" ry="3"/><text x="1152" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="16" text-anchor="start">GNS3 VM jump</text><rect width="26" height="18" x="1310" y="974" fill="#1ba0d7" fill-opacity="1" stroke="#cbd5e1" stroke-width="1" rx="3" ry="3"/><text x="1342" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="16" text-anchor="start">IOS-XRv P/PE</text><rect width="26" height="18" x="1500" y="974" fill="#6a1b9a" fill-opacity="1" stroke="#cbd5e1" stroke-width="1" rx="3" ry="3"/><text x="1532" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="16" text-anchor="start">transit IOS-XE</text><rect width="26" height="18" x="1690" y="974" fill="#455a64" fill-opacity="1" stroke="#cbd5e1" stroke-width="1" rx="3" ry="3"/><text x="1722" y="992" fill="#0d2b4e" font-family="Helvetica" font-size="16" text-anchor="start">PC3 terminal</text><rect width="1810" height="60" x="55" y="1016" fill="#fff1f2" fill-opacity="1" stroke="#be123c" stroke-width="1.5" rx="10" ry="10"/><text x="74" y="1040" fill="#881337" font-family="Helvetica" font-size="16" font-weight="bold" text-anchor="start">Mgmt is OOB via MGMT-SW01 (10.255.191.0/24, demarc .1 on the GNS3 VM tap). The GNS3 VM (100.118.0.46) is the ONLY jump - PC3 never reaches a node directly. Doc ASNs/IPs (RFC 5398/5737/3849); break-glass passwords live in Ansible Vault, not in this diagram.</text><text x="38" y="1062" fill="#94a3b8" font-family="Helvetica" font-size="14" text-anchor="start">Generated by ops/access/diagrams/render_node_access.py (4K print: 3840x2160) - jump gns3@100.118.0.46 (Tailscale) - mgmt 10.255.191.0/24 via MGMT-SW01 - sources: README.md, docs/aurora-deployment-status.md, docs/adr-004</text></svg>