="#fff" font-family="Helvetica" font-size="25" font-weight="bold" text-anchor="middle">ADL-PE1</text><text x="1654" y="350" fill="#fff" font-family="Helvetica" font-size="16" text-anchor="middle">IOS-XRv 6.1.3 - PE</text><text x="1654" y="376" fill="#fff" font-family="Helvetica" font-size="16" text-anchor="middle">mgmt .17 - console in GNS3</text><rect width="810" height="195" x="1050" y="430" fill="#f5f3ff" fill-opacity=".5" stroke="#7e22ce" stroke-width="1.8" rx="14" ry="14"/><text x="1070" y="464" fill="#7e22ce" font-family="Helvetica" font-size="20" font-weight="bold" text-anchor="start">Transit edge - Cisco IOS-XE (mgmt 10.255.191.21-.22)</text><rect width="372" height="116" x="1078" y="484" fill="#6a1b9a" fill-opacity="1" stroke="#fff" stroke-width="1.4" rx="10" ry="10"/><text x="1264" y="528" fill="#fff" font-family="Helvetica" font-size="25" font-weight="bold" text-anchor="middle">transit-a-csr</text><text x="1264" y="560" fill="#fff" font-family="Helvetica" font-size="16" text-anchor="middle">CSR1000v 16.08 - AS 64497</text><text x="1264" y="586" fill="#fff" font-family="Helvetica" font-size="16" text-anchor="middle">mgmt .21 - console :5009</text><rect width="372" height="116" x="1468" y="484" fill="#6a1b9a" fill-opacity="1" stroke="#fff" stroke-width="1.4" rx="10" ry="10"/><text x="1654" y="528" fill="#fff" font-family="Helvetica" font-size="25" font-weight="bold" text-anchor="middle">transit-b-iol</text><text x="1654" y="560" fill="#fff" font-family="Helvetica" font-size="16" text-anchor="middle">IOL-XE 17.15 - AS 64498</text><text x="1654" y="586" fill="#fff" font-family="Helvetica" font-size="16" text-anchor="middle">mgmt .22 - console :5013</text><line x1="418" x2="556" y1="420" y2="420" stroke="#1d4ed8" stroke-width="4.5"/><text x="487" y="408" fill="#1d4ed8" font-family="Helvetica" font-size="18" font-weight="bold" text-anchor="middle">(1) ssh -J</text><line x1="418" x2="556" y1="470" y2="470" stroke="#b45309" stroke-dasharray="9 6" stroke-width="4.