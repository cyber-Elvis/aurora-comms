<text x="38" y="42" font-family="Helvetica" font-size="32" fill="#ffffff" text-anchor="start" font-weight="bold">Aurora Communications - Reaching GNS3 nodes from PC3 (Termius)</text>
<text x="38" y="76" font-family="Helvetica" font-size="18" fill="#9db8d6" text-anchor="start">ONE jump host: GNS3 VM gns3@100.118.0.46 (Tailscale).    (1) SSH ProxyJump -&gt; node mgmt 10.255.191.0/24 (day-to-day).    (2) telnet -&gt; GNS3 VM console port (bootstrap / break-glass).</text>
<rect x="55" y="360" width="360" height="155" rx="10" ry="10" fill="#455a64" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="235.0" y="404" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">PC3</text>
<text x="235.0" y="436" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">Termius - terminal box</text>
<text x="235.0" y="462" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">all access starts here</text>
<rect x="560" y="345" width="440" height="185" rx="10" ry="10" fill="#0e7490" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="780.0" y="389" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">GNS3 VM  -  jump host</text>
<text x="780.0" y="421" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">gns3@100.118.0.46  -  Tailscale</text>
<text x="780.0" y="447" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">SSH ProxyJump + console host</text>
<text x="780" y="562" font-family="Helvetica" font-size="16" fill="#475569" text-anchor="middle">holds 10.255.191.1 (tap-aurora-mgmt) -&gt; reaches node mgmt directly</text>
<rect x="1050" y="100" width="810" height="300" rx="14" ry="14" fill="#eff6ff" fill-opacity="0.5" stroke="#1d4ed8" stroke-width="1.8"/>
<text x="1070" y="134" font-family="Helvetica" font-size="20" fill="#1d4ed8" text-anchor="start" font-weight="bold">Region A backbone - Cisco IOS-XRv 6.1.3   (mgmt 10.255.191.11-.17)</text>
<rect x="1078" y="152" width="372" height="110" rx="10" ry="10" fill="#1ba0d7" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="1264.0" y="196" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">MEL-P</text>
<text x="1264.0" y="228" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">IOS-XRv 6.1.3 - P core</text>
<text x="1264.0" y="254" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">mgmt .11  -  console in GNS3</text>
<rect x="1468" y="152" width="372" height="110" rx="10" ry="10" fill="#1ba0d7" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="1654.0" y="196" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">MEL-PE1</text>
<text x="1654.0" y="228" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">IOS-XRv 6.1.3 - PE / ASBR</text>
<text x="1654.0" y="254" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">mgmt .12  -  console in GNS3</text>
<rect x="1078" y="274" width="372" height="110" rx="10" ry="10" fill="#1ba0d7" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="1264.0" y="318" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">GEL-PE1</text>
<text x="1264.0" y="350" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">IOS-XRv 6.1.3 - PE</text>
<text x="1264.0" y="376" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">mgmt .15  -  console in GNS3</text>
<rect x="1468" y="274" width="372" height="110" rx="10" ry="10" fill="#1ba0d7" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="1654.0" y="318" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">ADL-PE1</text>
<text x="1654.0" y="350" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">IOS-XRv 6.1.3 - PE</text>
<text x="1654.0" y="376" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">mgmt .17  -  console in GNS3</text>
<rect x="1050" y="430" width="810" height="195" rx="14" ry="14" fill="#f5f3ff" fill-opacity="0.5" stroke="#7e22ce" stroke-width="1.8"/>
<text x="1070" y="464" font-family="Helvetica" font-size="20" fill="#7e22ce" text-anchor="start" font-weight="bold">Transit edge - Cisco IOS-XE   (mgmt 10.255.191.21-.22)</text>
<rect x="1078" y="484" width="372" height="116" rx="10" ry="10" fill="#6a1b9a" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="1264.0" y="528" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">transit-a-csr</text>
<text x="1264.0" y="560" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">CSR1000v 16.08 - AS 64497</text>
<text x="1264.0" y="586" font-family="Helvetica" font-size="16" fill="#ffffff" text-anchor="middle">mgmt .21  -  console :5009</text>
<rect x="1468" y="484" width="372" height="116" rx="10" ry="10" fill="#6a1b9a" fill-opacity="1.0" stroke="#ffffff" stroke-width="1.4"/>
<text x="1654.0" y="528" font-family="Helvetica" font-size="25" fill="#ffffff" text-anchor="middle" font-weight="bold">transit-b-iol</text>
