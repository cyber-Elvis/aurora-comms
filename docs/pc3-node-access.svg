<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
<rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#ffffff" fill-opacity="1.0" stroke="none" stroke-width="1.5"/>
