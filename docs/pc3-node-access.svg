<text x="1024" y="414" font-family="Helvetica" font-size="15" fill="#334155" text-anchor="middle">:22 ssh  /  console telnet</text>
<rect x="55" y="660" width="905" height="300" rx="12" ry="12" fill="#f4f7fb" fill-opacity="1.0" stroke="#c3d0e0" stroke-width="1.6"/>
<rect x="55" y="660" width="905" height="38" rx="12" ry="12" fill="#0e7490" fill-opacity="1.0" stroke="none" stroke-width="0"/>
<rect x="55" y="679" width="905" height="19" rx="0" ry="0" fill="#0e7490" fill-opacity="1.0" stroke="none" stroke-width="0"/>
<text x="73" y="687" font-family="Helvetica" font-size="19" fill="#ffffff" text-anchor="start" font-weight="bold">Connect (from a PC3 Termius session)</text>
<text x="73" y="734" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">(1) SSH - day-to-day, once the node has mgmt SSH:</text>
<text x="73" y="767" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">       ssh -J gns3@100.118.0.46 labadmin@10.255.191.21</text>
<text x="73" y="800" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">(2) Console - bootstrap / break-glass, works on a blank node:</text>
<text x="73" y="833" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">       telnet 100.118.0.46 5009</text>
<text x="73" y="866" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">Termius setup</text>
<text x="285" y="866" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">node Host = mgmt IP; Jump host = gns3@100.118.0.46</text>
<text x="73" y="899" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">Auth</text>
<text x="285" y="899" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">key -&gt; jump    -    password -&gt; node</text>
<rect x="980" y="660" width="460" height="300" rx="12" ry="12" fill="#f4f7fb" fill-opacity="1.0" stroke="#c3d0e0" stroke-width="1.6"/>
<rect x="980" y="660" width="460" height="38" rx="12" ry="12" fill="#0d2b4e" fill-opacity="1.0" stroke="none" stroke-width="0"/>
<rect x="980" y="679" width="460" height="19" rx="0" ry="0" fill="#0d2b4e" fill-opacity="1.0" stroke="none" stroke-width="0"/>
<text x="998" y="687" font-family="Helvetica" font-size="19" fill="#ffffff" text-anchor="start" font-weight="bold">Accounts (least-privilege)</text>
<text x="998" y="734" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">labadmin</text>
<text x="1210" y="734" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">break-glass admin - every node</text>
<text x="998" y="767" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">IOS-XR read</text>
<text x="1210" y="767" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">aurora-claude / aurora-codex</text>
<text x="998" y="800" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">IOS-XR write</text>
<text x="1210" y="800" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">aurora-automation (cfg)</text>
<text x="998" y="833" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">aurora-security (crypto)</text>
<text x="998" y="866" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">Transit IOS-XE</text>
<text x="1210" y="866" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">labadmin only (tiers TBD)</text>
<text x="998" y="899" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">Never</text>
<text x="1210" y="899" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">reuse a credential</text>
<rect x="1460" y="660" width="405" height="300" rx="12" ry="12" fill="#f4f7fb" fill-opacity="1.0" stroke="#c3d0e0" stroke-width="1.6"/>
<rect x="1460" y="660" width="405" height="38" rx="12" ry="12" fill="#6a1b9a" fill-opacity="1.0" stroke="none" stroke-width="0"/>
<rect x="1460" y="679" width="405" height="19" rx="0" ry="0" fill="#6a1b9a" fill-opacity="1.0" stroke="none" stroke-width="0"/>
<text x="1478" y="687" font-family="Helvetica" font-size="19" fill="#ffffff" text-anchor="start" font-weight="bold">Console ports (telnet GNS3 VM)</text>
<text x="1478" y="734" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">transit-a-csr</text>
<text x="1690" y="734" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">:5009</text>
<text x="1478" y="767" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">transit-b-iol</text>
<text x="1690" y="767" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">:5013</text>
<text x="1478" y="800" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">IOS-XR nodes</text>
<text x="1690" y="800" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">per-node - see GNS3</text>
<text x="1478" y="833" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">Use when</text>
<text x="1690" y="833" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">no SSH yet / locked out</text>
<text x="1478" y="866" font-family="Helvetica" font-size="17" fill="#334155" text-anchor="start" font-weight="bold">Then</text>
<text x="1690" y="866" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">switch to SSH;</text>
<text x="1478" y="899" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">console = break-glass</text>
<text x="55" y="992" font-family="Helvetica" font-size="20" fill="#0d2b4e" text-anchor="start" font-weight="bold">Legend</text>
<line x1="170" y1="986" x2="220" y2="986" stroke="#1d4ed8" stroke-width="4.5"/>
<text x="232" y="992" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">(1) SSH ProxyJump -&gt; node mgmt :22</text>
<line x1="640" y1="986" x2="690" y2="986" stroke="#b45309" stroke-width="4.5" stroke-dasharray="9 6"/>
<text x="702" y="992" font-family="Helvetica" font-size="17" fill="#0d2b4e" text-anchor="start">(2) telnet -&gt; GNS3 VM console port</text>
<rect x="1120" y="974" width="26" height="18" rx="3" ry="3" fill="#0e7490" fill-opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<text x="1152" y="992" font-family="Helvetica" font-size="16" fill="#0d2b4e" text-anchor="start">GNS3 VM jump</text>
<rect x="1310" y="974" width="26" height="18" rx="3" ry="3" fill="#1ba0d7" fill-opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<text x="1342" y="992" font-family="Helvetica" font-size="16" fill="#0d2b4e" text-anchor="start">IOS-XRv P/PE</text>
<rect x="1500" y="974" width="26" height="18" rx="3" ry="3" fill="#6a1b9a" fill-opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<text x="1532" y="992" font-family="Helvetica" font-size="16" fill="#0d2b4e" text-anchor="start">transit IOS-XE</text>
<rect x="1690" y="974" width="26" height="18" rx="3" ry="3" fill="#455a64" fill-opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<text x="1722" y="992" font-family="Helvetica" font-size="16" fill="#0d2b4e" text-anchor="start">PC3 terminal</text>
<rect x="55" y="1016" width="1810" height="60" rx="10" ry="10" fill="#fff1f2" fill-opacity="1.0" stroke="#be123c" stroke-width="1.5"/>
<text x="74" y="1040" font-family="Helvetica" font-size="16" fill="#881337" text-anchor="start" font-weight="bold">Mgmt is OOB via MGMT-SW01 (10.255.191.0/24, demarc .1 on the GNS3 VM tap). The GNS3 VM (100.118.0.46) is the ONLY jump - PC3 never reaches a node directly.    Doc ASNs/IPs (RFC 5398/5737/3849); break-glass passwords live in Ansible Vault, not in this diagram.</text>
<text x="38" y="1062" font-family="Helvetica" font-size="14" fill="#94a3b8" text-anchor="start">Generated by ops/access/diagrams/render_node_access.py  (4K print: 3840x2160)  -  jump gns3@100.118.0.46 (Tailscale)  -  mgmt 10.255.191.0/24 via MGMT-SW01  -  sources: README.md, docs/aurora-deployment-status.md, docs/adr-004</text>
