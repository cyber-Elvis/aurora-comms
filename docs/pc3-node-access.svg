<text x="487" y="408" font-family="Helvetica" font-size="18" fill="#1d4ed8" text-anchor="middle" font-weight="bold">(1) ssh -J</text>
<line x1="418" y1="470" x2="556" y2="470" stroke="#b45309" stroke-width="4.5" stroke-dasharray="9 6"/>
<text x="487" y="494" font-family="Helvetica" font-size="18" fill="#b45309" text-anchor="middle" font-weight="bold">(2) telnet</text>
